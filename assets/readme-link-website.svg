    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #9a6c31; }
    }
  </style>
  <rect width="840" height="16" class="bg"/>
  <text x="12" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" class="text" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.5s" fill="freeze"/>
    Website &#8599;
  </text>
</svg>
