<svg xmlns="http://www.w3.org/2000/svg" width="840" height="20" viewBox="0 0 840 20">
  <style>
    .bg { fill: #0d1117; }
    .text { fill: #e0a458; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #9a6c31; }
    }
  </style>
  <rect width="840" height="20" class="bg"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" class="text" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.2s" fill="freeze"/>
    <text x="12" y="14" font-weight="600">Menu</text>
    <text x="420" y="14" text-anchor="middle">1.2k Contributions</text>
    <text x="828" y="14" text-anchor="end">readme.md</text>
  </g>
</svg>
