<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Daniel Belyi README Surface</title>
  <desc id="desc">A minimalist profile website rendered inside an SVG using HTML and CSS for GitHub README.</desc>

  <rect x="1" y="1" width="1598" height="1078" rx="12" fill="#020814" stroke="#3a4b64" stroke-opacity="0.8" stroke-width="2"/>

  <foreignObject x="0" y="0" width="1600" height="1080">
    <div xmlns="http://www.w3.org/1999/xhtml" class="scene">
      <style>
        :root {
          --bg: #020814;
          --blue: #2f72ff;
          --text: #dce8ff;
          --muted: #a9bddf;
          --stroke: rgba(80, 106, 145, 0.65);
        }

        * {
          box-sizing: border-box;
        }

        .scene {
          width: 100%;
          height: 100%;
          padding: 18px;
          background:
            radial-gradient(1200px 520px at 100% -15%, rgba(18, 54, 130, 0.28), transparent 72%),
            radial-gradient(900px 520px at 0% 100%, rgba(7, 34, 88, 0.2), transparent 70%),
            var(--bg);
          font-family: "Helvetica Neue", Helvetica, "Segoe UI", sans-serif;
        }

        .surface {
          width: 100%;
          height: 100%;
          border-radius: 14px;
          border: 2px solid var(--stroke);
          overflow: hidden;
          background: linear-gradient(180deg, rgba(2, 8, 20, 0.72), rgba(1, 6, 16, 0.92));
          position: relative;
        }

        .repo {
          position: absolute;
          top: 54px;
          left: 56px;
          margin: 0;
          color: var(--text);
          font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
          font-size: 39px;
          letter-spacing: 0.015em;
          opacity: 0.96;
        }

        .top-right {
          position: absolute;
          top: 122px;
          right: 56px;
          margin: 0;
          color: var(--blue);
          font-weight: 600;
          font-size: 50px;
          line-height: 1;
          letter-spacing: 0;
        }

        .menu {
          position: absolute;
          top: 122px;
          left: 56px;
          display: flex;
          flex-direction: column;
          gap: 2px;
          color: var(--blue);
          font-size: 50px;
          line-height: 1.25;
        }

        .menu b {
          font-weight: 700;
          margin-bottom: 2px;
        }

        .menu a {
          color: inherit;
          text-decoration: none;
          width: fit-content;
          border-bottom: 1px solid transparent;
        }

        .menu a:hover {
          border-bottom-color: rgba(47, 114, 255, 0.78);
        }

        .quote {
          position: absolute;
          left: 810px;
          right: 130px;
          top: 560px;
          margin: 0;
          color: var(--blue);
          font-size: 66px;
          line-height: 1.14;
          font-weight: 500;
          letter-spacing: -0.01em;
        }

        @media (max-width: 1200px) {
          .repo {
            top: 36px;
            left: 34px;
            font-size: 28px;
          }

          .top-right {
            top: 84px;
            right: 34px;
            font-size: 34px;
          }

          .menu {
            top: 84px;
            left: 34px;
            font-size: 34px;
            line-height: 1.2;
          }

          .quote {
            left: 50%;
            right: 38px;
            top: 420px;
            font-size: 46px;
          }
        }

        @media (max-width: 760px) {
          .scene {
            padding: 10px;
          }

          .surface {
            border-radius: 10px;
          }

          .repo {
            top: 16px;
            left: 16px;
            font-size: 14px;
          }

          .top-right {
            top: 46px;
            right: 16px;
            font-size: 16px;
          }

          .menu {
            top: 46px;
            left: 16px;
            font-size: 16px;
            gap: 0;
          }

          .quote {
            left: 16px;
            right: 16px;
            top: 210px;
            font-size: 17px;
            line-height: 1.28;
          }
        }
      </style>

      <article class="surface">
        <p class="repo">danielbelyi/readme.md</p>

        <nav class="menu" aria-label="Profile menu">
          <b>Menu</b>
          <a href="https://www.danielwhite.uk">Website &#8599;</a>
          <a href="https://x.com/">Twitter &#8599;</a>
          <a href="https://instagram.com/">Instagram &#8599;</a>
        </nav>

        <p class="top-right">readme.md</p>

        <p class="quote">I'm Daniel. A product-focused engineer building practical developer tools, high-quality interfaces, and useful digital systems.</p>
      </article>
    </div>
  </foreignObject>
</svg>
