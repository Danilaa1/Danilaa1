<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <style>
    .bg { fill: #0d1117; }
    .text-blue { fill: #3b82f6; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text-blue { fill: #0969da; }
    }
  </style>
  <rect width="800" height="120" class="bg"/>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="400" class="text-blue">
    <tspan x="12" y="80">I'm Daniel. A Derby-based front end engineer building</tspan>
    <tspan x="12" y="98">high-quality interfaces, practical developer tools,</tspan>
    <tspan x="12" y="116">and useful digital systems.</tspan>
  </text>
</svg>
