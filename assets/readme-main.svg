<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <style>
    .bg { fill: #0d1117; }
    .text-blue { fill: #3b82f6; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text-blue { fill: #0969da; }
    }
  </style>
  <rect width="800" height="180" class="bg"/>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" class="text-blue">
    <tspan x="20" y="50">I'm Daniel. A Derby-based front end</tspan>
    <tspan x="20" y="86">engineer building high-quality interfaces,</tspan>
    <tspan x="20" y="122">practical developer tools, and useful</tspan>
    <tspan x="20" y="158">digital systems.</tspan>
  </text>
</svg>
