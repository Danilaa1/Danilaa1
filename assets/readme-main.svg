<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <style>
    .bg { fill: #0d1117; }
    .text-blue { fill: #3b82f6; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text-blue { fill: #0969da; }
    }
  </style>
  <rect width="800" height="60" class="bg"/>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="400" class="text-blue">
    <tspan x="10" y="34">I'm Daniel. A Derby-based front end engineer building high-quality</tspan>
    <tspan x="10" y="47">interfaces, practical developer tools, and useful digital systems.</tspan>
  </text>
</svg>
