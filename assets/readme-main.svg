<svg xmlns="http://www.w3.org/2000/svg" width="840" height="520" viewBox="0 0 840 520">
  <style>
    .bg { fill: #0d1117; }
    .text { fill: #e0a458; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text { fill: #9a6c31; }
    }
  </style>
  <rect width="840" height="520" class="bg"/>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-style="italic" class="text" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="1.2s" fill="freeze"/>
    <tspan x="400" y="240">I'm Daniel. A Derby-based front end</tspan>
    <tspan x="400" y="274">engineer building high-quality</tspan>
    <tspan x="400" y="308">interfaces, practical developer tools,</tspan>
    <tspan x="400" y="342">and useful digital systems.</tspan>
  </text>
  <line x1="400" y1="360" x2="400" y2="360" stroke="#e0a458" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="1s" begin="2.5s" fill="freeze"/>
    <animate attributeName="x1" from="400" to="320" dur="1s" begin="2.5s" fill="freeze"/>
    <animate attributeName="x2" from="400" to="480" dur="1s" begin="2.5s" fill="freeze"/>
  </line>
</svg>
