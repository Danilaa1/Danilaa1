<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420">
  <style>
    .bg { fill: #0d1117; }
    .text-blue { fill: #3b82f6; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .text-blue { fill: #0969da; }
    }
  </style>
  <rect width="1600" height="420" class="bg"/>
  <text x="800" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="400" class="text-blue">
    <tspan x="800" dy="0">I'm Daniel. A Brooklyn-based internet</tspan>
    <tspan x="800" dy="68">enthusiast, creative technologist and maker</tspan>
    <tspan x="800" dy="68">of digital ephemera.</tspan>
  </text>
</svg>
