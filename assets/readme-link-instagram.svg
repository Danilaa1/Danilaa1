  <rect width="1600" height="60" class="bg"/>
  <text x="40" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="400" class="text-blue">Instagram &#8599;</text>
</svg>
